name: Build and Release Seafari

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  repository_dispatch:
    types: [firefox-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    outputs:
      version: ${{ steps.vars.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget tar sed dpkg-dev binutils libfuse2 ruby ruby-dev build-essential rpm libarchive-tools
          sudo gem install --no-document fpm

      - name: Build Seafari
        run: |
          chmod +x build_seafari.sh
          ./build_seafari.sh ${{ matrix.arch }}

      - name: Get Version
        id: vars
        run: |
          V=$(grep '^VERSION=' build_seafari.sh | cut -d'"' -f2)
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "VERSION=$V" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seafari_*.deb
            Seafari-*.AppImage
            seafari_*.rpm
            seafari_*.pkg.tar.zst
          tag_name: v${{ env.VERSION }}
          name: Seafari v${{ env.VERSION }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    needs: build-and-release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT Repo Update
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          
          for ARCH in amd64 arm64; do
            # English: Determine architecture naming conventions for the package formats
            # Español: Determinar las convenciones de nomenclatura de arquitectura para los formatos de paquete
            if [ "$ARCH" = "amd64" ]; then
              DEB_ARCH="amd64"
              RPM_ARCH="x86_64"
            else
              DEB_ARCH="arm64"
              RPM_ARCH="aarch64"
            fi

            DEB_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/seafari_${VERSION}_${DEB_ARCH}.deb"
            RPM_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/seafari_${VERSION}_${RPM_ARCH}.rpm"
            PKG_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/seafari_${VERSION}_${RPM_ARCH}.pkg.tar.zst"

            echo "Checking artifacts for $ARCH..."
            # English: Wait a few seconds to let GitHub Releases complete the upload process
            # Español: Esperar unos segundos para permitir que GitHub Releases complete el proceso de subida
            sleep 5

            # English: Build client payload dynamically based on which artifacts are successfully uploaded
            # Español: Construir el payload del cliente de manera dinámica según qué artefactos se hayan subido correctamente
            PAYLOAD_ITEMS=()

            if curl --output /dev/null --silent --head --fail "$DEB_URL"; then
              echo "  .deb artifact found!"
              PAYLOAD_ITEMS+=("\"deb_url\": \"$DEB_URL\"")
            else
              echo "  WARNING: .deb artifact not found at $DEB_URL"
            fi

            if curl --output /dev/null --silent --head --fail "$RPM_URL"; then
              echo "  .rpm artifact found!"
              PAYLOAD_ITEMS+=("\"rpm_url\": \"$RPM_URL\"")
            else
              echo "  WARNING: .rpm artifact not found at $RPM_URL"
            fi

            if curl --output /dev/null --silent --head --fail "$PKG_URL"; then
              echo "  .pkg.tar.zst artifact found!"
              PAYLOAD_ITEMS+=("\"pkg_url\": \"$PKG_URL\"")
            else
              echo "  WARNING: .pkg.tar.zst artifact not found at $PKG_URL"
            fi

            # English: If at least one package is found, trigger the repository update
            # Español: Si se encuentra al menos un paquete, disparar la actualización del repositorio
            if [ ${#PAYLOAD_ITEMS[@]} -gt 0 ]; then
              # English: Join the payload elements with commas
              # Español: Unir los elementos del payload con comas
              IFS=,
              CLIENT_PAYLOAD="{$(echo "${PAYLOAD_ITEMS[*]}")}"
              unset IFS

              echo "Triggering update for $ARCH with payload: $CLIENT_PAYLOAD"
              curl -X POST \
                -H "Accept: application/vnd.github.v3+json" \
                -H "Authorization: token ${{ secrets.APT_REPO_TOKEN }}" \
                https://api.github.com/repos/InledGroup/apt/dispatches \
                -d "{\"event_type\": \"package_upload\", \"client_payload\": $CLIENT_PAYLOAD}"
            else
              echo "WARNING: No artifacts found for $ARCH. Skipping update trigger."
            fi
          done

