name: Build and Release Seafari

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget tar sed dpkg-dev binutils libfuse2 ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build Seafari
        run: |
          chmod +x build_seafari.sh
          ./build_seafari.sh ${{ matrix.arch }}

      - name: Prepare Artifacts
        run: |
          # Move files to root for easier upload/release
          mv seafari_*.deb .
          mv Seafari-*.AppImage .
          mv seafari-*.rpm . || true

      - name: Get Version and Filenames
        id: vars
        run: |
          VERSION=$(grep '^VERSION=' build_seafari.sh | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV
          # Use wildcards to find the files since arch names vary
          echo "DEB_FILE=$(ls seafari_${VERSION}_*.deb)" >> $GITHUB_OUTPUT
          echo "APPIMAGE_FILE=$(ls Seafari-*.AppImage)" >> $GITHUB_OUTPUT
          echo "RPM_FILE=$(ls seafari-*.rpm)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seafari_*.deb
            Seafari-*.AppImage
            seafari-*.rpm
          tag_name: v1.0.0
          name: Seafari v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT Repo Update
        run: |
          # We only trigger once after all builds are done
          # Assuming amd64 is the primary for the APT repo structure
          DEB_URL="https://github.com/${{ github.repository }}/releases/download/v1.0.0/seafari_1.0.0_amd64.deb"
          echo "Triggering update at InledGroup/apt for $DEB_URL..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.APT_REPO_TOKEN }}" \
            https://api.github.com/repos/InledGroup/apt/dispatches \
            -d "{\"event_type\": \"package_upload\", \"client_payload\": {\"deb_url\": \"$DEB_URL\"}}"
