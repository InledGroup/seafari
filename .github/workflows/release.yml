name: Build and Release Seafari

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  repository_dispatch:
    types: [firefox-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    outputs:
      version: ${{ steps.vars.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget tar sed dpkg-dev binutils libfuse2 ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build Seafari
        run: |
          chmod +x build_seafari.sh
          ./build_seafari.sh ${{ matrix.arch }}

      - name: Get Version
        id: vars
        run: |
          V=$(grep '^VERSION=' build_seafari.sh | cut -d'"' -f2)
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "VERSION=$V" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seafari_*.deb
            Seafari-*.AppImage
            seafari-*.rpm
            seafari-*.pacman
          tag_name: v${{ env.VERSION }}
          name: Seafari v${{ env.VERSION }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    needs: build-and-release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT Repo Update
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          DEB_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/seafari_${VERSION}_amd64.deb"
          
          echo "Target Version: $VERSION"
          echo "Checking if artifact exists at $DEB_URL..."
          
          # Wait a few seconds for GitHub to finish processing the release assets
          sleep 10
          
          if curl --output /dev/null --silent --head --fail "$DEB_URL"; then
            echo "Artifact found! Triggering update at InledGroup/apt..."
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.APT_REPO_TOKEN }}" \
              https://api.github.com/repos/InledGroup/apt/dispatches \
              -d "{\"event_type\": \"package_upload\", \"client_payload\": {\"deb_url\": \"$DEB_URL\"}}"
          else
            echo "ERROR: Artifact not found at $DEB_URL. APT update skipped."
            exit 1
          fi
