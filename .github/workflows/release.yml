name: Build and Release Seafari

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * *' # Every day at midnight
  repository_dispatch:
    types: [firefox-update]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'repository_dispatch' || contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false # Don't cancel other jobs if one fails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget tar sed dpkg-dev binutils libfuse2 ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build Seafari
        run: |
          chmod +x build_seafari.sh
          ./build_seafari.sh ${{ matrix.arch }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seafari_*.deb
            Seafari-*.AppImage
            seafari-*.rpm
          tag_name: v1.0.0
          name: Seafari v1.0.0
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-apt-update:
    needs: build-and-release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT Repo Update
        run: |
          DEB_URL="https://github.com/${{ github.repository }}/releases/download/v1.0.0/seafari_1.0.0_amd64.deb"
          echo "Triggering update at InledGroup/apt for $DEB_URL..."
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.APT_REPO_TOKEN }}" \
            https://api.github.com/repos/InledGroup/apt/dispatches \
            -d "{\"event_type\": \"package_upload\", \"client_payload\": {\"deb_url\": \"$DEB_URL\"}}"
